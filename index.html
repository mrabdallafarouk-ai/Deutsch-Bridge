<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Deutsch Bridge — Aussprache-Abenteuer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ====== AUDIO SPRACH-SUPPORT (geladen, nichts sichtbar) ====== -->

  <!-- ====== HAUPT-APP CONTAINER ====== -->
  <div id="app">

    <!-- ====== OBERE LEISTE: XP / STREAK / STERNE ====== -->
    <header id="topbar" class="topbar">
      <button id="homeBtn" class="icon-btn" title="Karte" aria-label="Karte">🗺️</button>
      <div class="brand" id="brandBtn" title="Deutsch Bridge">
        <span class="brand-flag">🇩🇪</span>
        <span class="brand-name">Deutsch Bridge</span>
      </div>
      <div class="stats">
        <span class="stat" title="Erfahrungspunkte">⚡ <b id="xpVal">0</b></span>
        <span class="stat" title="Tage-Serie">🔥 <b id="streakVal">0</b></span>
        <span class="stat" title="Sterne gesamt">⭐ <b id="starsVal">0</b></span>
      </div>
    </header>

    <!-- ====== BILDSCHIRM: KARTE (Home) ====== -->
    <main id="screen-map" class="screen active">
      <div class="map-hero">
        <h1>Willkommen zurück! 👋</h1>
        <p class="map-sub" id="mapSub">Deine Aussprache-Reise durch die deutsche Sprache.</p>
        <div class="xpbar-wrap">
          <div class="xpbar" id="xpBar" style="width:0%"></div>
        </div>
        <div class="lvl-label">Level <b id="lvlNum">1</b> · Gesamt <b id="totalStarsMap">0</b>⭐ / 75</div>
      </div>
      <div id="weekGrid" class="week-grid"></div>
      <div class="badges-row">
        <h2>🏆 Abzeichen</h2>
        <div id="badgesBox" class="badges-box"></div>
      </div>
    </main>

    <!-- ====== BILDSCHIRM: LEVEL (Stations-Reihe) ====== -->
    <main id="screen-level" class="screen">
      <div class="level-head">
        <button class="icon-btn back" id="levelBackBtn">← Karte</button>
        <div class="level-title" id="levelTitle">Tag 1</div>
        <div class="level-progress">
          <div class="level-progress-fill" id="levelProgressFill"></div>
        </div>
      </div>
      <div id="stationHost"></div>
    </main>

    <!-- ====== BILDSCHIRM: ABSCHLUSS / CELEBRATION ====== -->
    <main id="screen-done" class="screen">
      <div class="done-card">
        <div class="done-emoji" id="doneEmoji">🎉</div>
        <h1 id="doneTitle">Level geschafft!</h1>
        <div class="done-stars" id="doneStars"></div>
        <p class="done-xp">+<b id="doneXp">0</b> Erfahrungspunkte</p>
        <p class="done-msg" id="doneMsg"></p>
        <div class="done-actions">
          <button class="btn primary" id="doneNextBtn">Weiter ▶</button>
          <button class="btn ghost" id="doneHomeBtn">Zur Karte</button>
        </div>
      </div>
      <canvas id="confetti" class="confetti"></canvas>
    </main>

  </div>

  <!-- ====== ALLGEMEINES TOAST ====== -->
  <div id="toast" class="toast"></div>

  <!-- ====== SPRACH-HINWEIS FALLS KEINE DEUTSCHE STIMME ====== -->
  <div id="voiceNotice" class="voice-notice hidden">
    <span>⚠️ Keine deutsche Stimme gefunden. Installiere eine deutsche Sprache in den Systemeinstellungen für Audio.</span>
    <button id="voiceNoticeClose">✕</button>
  </div>

  <!-- ====== SKRIPTE (Plain JS, file:// tauglich) ====== -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
